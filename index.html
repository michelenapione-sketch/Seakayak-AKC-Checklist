<script src="https://unpkg.com/lucide@latest">
// 🌍 GPS + MAPPA
function initMap(lat, lon){
  document.getElementById("map").style.display = "block";

  if(mapInstance){
    mapInstance.remove();
  }
  mapInstance = L.map('map').setView([lat, lon], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapInstance);

  L.marker([lat, lon]).addTo(mapInstance)
    .bindPopup("Sei qui")
    .openPopup();
}

let mapVisible = false;
let mapInstance = null;

function getLocation(){
  if(mapVisible){
    document.getElementById("map").style.display = "none";
    document.getElementById("gps").innerHTML = "";
    mapVisible = false;
    return;
  }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      document.getElementById("gps").innerHTML =
        "📍 Lat: "+lat.toFixed(5)+" | Lon: "+lon.toFixed(5);

      initMap(lat, lon);
      mapVisible = true;

    }, ()=>{
      alert("GPS non disponibile");
    });
  }
}

</script>

<script>

"PONTE KAYAK":["Pagaia principale","Pagaia di rispetto","Pompa di sentina/Sassola","Spugna","Paddle float","Cima traino","Contact line","Casco","Bussola","Carta nautica"],
"SISTEMA NOTTE":["Tenda/Tarp","Cordini","Pali","Picchetti","Materassino","Sacco a pelo","Cuscino","Bivi bag","Sacco letto"],
"VESTITI DI RICAMBIO":["Intimo","Baselayer","Midlayer","Giacca calda","Calze","Cappello di lana","Guanti di lana","Scarpe"],
"CUCINA":["Fornellino","Pentola","Posate","Tazza","Caffettiera","Carburante fornello","Spugna pulizia"],
"SISTEMA ACQUA":["Taniche","Borracce","Filtro acqua","Pastiglie purificatrici","Camel bag"],
"SICUREZZA":["Kit primo soccorso","Kit Igiene","Telefono in sacca stagna","Kit riparazione kayak","Kit riparazione oggetti","Luce frontale","Luci navigazione notturna","Power bank","Batterie","Cavi ricarica","Leatherman o Victorinox","Accendino","Crema solare","Sacchetti robusti","Sacche stagne","Poncho"],
"SISTEMA FUOCO / ATTREZZI":["Segaccio","Accetta","Acciarino","Inneschi","Coltello","Paletta"]
};

function loadData(){return JSON.parse(localStorage.getItem("checklist"))||{};}

// 🔥 AUTOSAVE SU INPUT (fix CIBO/METEO)
document.addEventListener("input", function(e){
  let stored = JSON.parse(localStorage.getItem("checklist")) || {};
  if(e.target && e.target.id){
    stored[e.target.id] = e.target.type==="checkbox" ? e.target.checked : e.target.value;
    localStorage.setItem("checklist", JSON.stringify(stored));
  }
});


function saveData(){
 let existing = JSON.parse(localStorage.getItem("checklist")) || {};
 let saved={...existing};

 document.querySelectorAll("input,textarea").forEach(i=>{
  saved[i.id]= i.type==="checkbox"? i.checked : i.value;
 });

 localStorage.setItem("checklist",JSON.stringify(saved));
 alert("Salvato 👍");
}

function resetData(){
 if(confirm("Vuoi resettare tutto?")){
  localStorage.clear();
  location.reload();
 }
}

function toggle(el){
 let c=el.nextElementSibling;
 c.style.display=c.style.display==="block"?"none":"block";
}

function renderSection(app,name,items,saved){
 let div=document.createElement("div");div.className="section";
 let h=document.createElement("div");h.className="section-header";h.innerHTML=(icons[name] ? icons[name]+" " : "") + name;h.onclick=()=>toggle(h);
 div.appendChild(h);
 let c=document.createElement("div");c.className="section-content";

 items.forEach(item=>{
  let row=document.createElement("div");row.className="item-row";
  let label=document.createElement("label");label.className="main";
  let id=name+"_"+item;

  let cb=document.createElement("input");cb.type="checkbox";cb.id=id;
  if(saved[id])cb.checked=true;
  label.appendChild(cb);label.append(" "+item);

  let pos=document.createElement("div");pos.className="pos";
  positions.forEach(p=>{
    let pid=id+"_"+p;
    let pl=document.createElement("label");
    let pcb=document.createElement("input");pcb.type="checkbox";pcb.id=pid;
    if(saved[pid])pcb.checked=true;

    // 🔥 esclusività GA PH DH GP
    pcb.addEventListener("change", function(){
      if(this.checked){
        positions.forEach(other=>{
          if(other !== p){
            let otherId = id + "_" + other;
            let otherCb = document.getElementById(otherId);
            if(otherCb) otherCb.checked = false;
          }
        });
      }
    });

    pl.appendChild(pcb);
    let t=document.createElement("span");t.innerText=p;
    pl.appendChild(t);
    pos.appendChild(pl);
  });

  row.appendChild(label);
  row.appendChild(pos);

  // ❌ delete button
  let del = document.createElement("button");
  del.innerText="❌";
  del.style.background="red";
  del.style.marginLeft="5px";
  del.style.padding="2px 6px";
  del.style.fontSize="10px";
  del.style.borderRadius="4px";

  del.onclick=function(){
    let stored = JSON.parse(localStorage.getItem("checklist")) || {};
    let key = name+"_ALTRO";
    let items = JSON.parse(stored[key]||"[]");
    items = items.filter(x=>x!==it);
    stored[key]=JSON.stringify(items);
    localStorage.setItem("checklist",JSON.stringify(stored));
    render();
if (window.lucide) { lucide.createIcons(); }
  openSectionByName(name);
  };

  row.appendChild(del);
  c.appendChild(row);
 });

 

// 🔥 ALTRO per sezione (PRO)
let stored = JSON.parse(localStorage.getItem("checklist")) || {};
let keyExtra = name+"_ALTRO";
let itemsExtra = [];

if(stored[keyExtra]){
  try{ itemsExtra = JSON.parse(stored[keyExtra]); }catch(e){}
}

// 🔥 render elementi extra SOPRA
itemsExtra.forEach(it=>{
  let row=document.createElement("div");row.className="item-row";
  let label=document.createElement("label");label.className="main";

  let id=name+"_ALTRO_"+it;

  let cb=document.createElement("input");cb.type="checkbox";cb.id=id;

  label.appendChild(cb);label.append(" "+it);

    let pcb=document.createElement("input");pcb.type="checkbox";pcb.id=pid;
    if(saved[pid])pcb.checked=true;

    pcb.addEventListener("change", function(){

          if(other !== p){
            let otherId = id + "_" + other;
            let otherCb = document.getElementById(otherId);
            if(otherCb) otherCb.checked = false;

        });

    });

    pl.appendChild(pcb);
    let t=document.createElement("span");t.innerText=p;
    pl.appendChild(t);
    pos.appendChild(pl);
  });

  row.appendChild(label);
  row.appendChild(pos);

  // ❌ delete button
  let del = document.createElement("button");
  del.innerText="❌";
  del.style.background="red";
  del.style.marginLeft="5px";
  del.style.padding="2px 6px";
  del.style.fontSize="10px";
  del.style.borderRadius="4px";

  del.onclick=function(){
    let stored = JSON.parse(localStorage.getItem("checklist")) || {};
    let key = name+"_ALTRO";
    let items = JSON.parse(stored[key]||"[]");
    items = items.filter(x=>x!==it);
    stored[key]=JSON.stringify(items);
    localStorage.setItem("checklist",JSON.stringify(stored));
    render();
if (window.lucide) { lucide.createIcons(); }
  openSectionByName(name);
  };

  row.appendChild(del);
  c.appendChild(row);
});

// 🔥 input aggiunta (UNO SOLO)
let extraInput = document.createElement("input");
extraInput.placeholder = "Aggiungi elemento...";

let extraBtn = document.createElement("button");
extraBtn.innerText = "Aggiungi";

extraBtn.onclick = function(){

  if(!extraInput.value) return;

  // 🔥 salva stato attuale PRIMA del render
  let current = {};
  document.querySelectorAll("input,textarea").forEach(i=>{
    current[i.id]= i.type==="checkbox"? i.checked : i.value;
  });

  let stored = JSON.parse(localStorage.getItem("checklist")) || {};
  stored = {...stored, ...current};

  let key = name+"_ALTRO";

  let items = [];
  if(stored[key]){
    try{ items = JSON.parse(stored[key]); }catch(e){}
  }

  items.push(extraInput.value);
  stored[key] = JSON.stringify(items);

  localStorage.setItem("checklist", JSON.stringify(stored));

  extraInput.value="";
  render();
if (window.lucide) { lucide.createIcons(); }
  openSectionByName(name);
};

c.appendChild(extraInput);
c.appendChild(extraBtn);

div.appendChild(c);
 app.appendChild(div);
 return c;


}

function printChecklist(){window.print();}

function render(){
 const app=document.getElementById("app");
 app.innerHTML="";
 const saved=loadData();

  // 🔥 ripristina nome e kayak
  if(saved["user_name"]) document.getElementById("user_name").value = saved["user_name"];
  if(saved["kayak_type"]) document.getElementById("kayak_type").value = saved["kayak_type"];


 for(let s in data){

  header.innerHTML="<b>Giorno "+i+"</b>";

  header.onclick=()=>{
    fc.querySelectorAll('.day > div:nth-child(2)').forEach(c=>{
      if(c !== content) c.style.display = "none";
    });
    content.style.display = content.style.display==="block"?"none":"block";
  };

  let del=document.createElement("button");
del.innerText="❌";
del.style.fontSize="10px";
del.style.marginLeft="10px";
del.onclick=()=>{
  let stored=loadData();
  ["Colazione","Pranzo","Cena"].forEach(m=>{
    delete stored["food_"+i+"_"+m];
  });
  stored["food_days"]=Math.max(1,(stored["food_days"]||1)-1);
  localStorage.setItem("checklist",JSON.stringify(stored));
  render();
  openSectionByName("CIBO");
  openSectionByName("METEO");
  openSectionByName("CIBO");
};
header.appendChild(del);

d.appendChild(header);

  ["Colazione","Pranzo","Cena"].forEach(m=>{
    let l=document.createElement("div");l.className="meal";l.innerText=m;
    let inp=document.createElement("input");inp.id="food_"+i+"_"+m;
    if(saved[inp.id])inp.value=saved[inp.id];
    content.appendChild(l);content.appendChild(inp);
  });

  d.appendChild(content);
  fc.appendChild(d);
 }

 let addBtn=document.createElement("button");
 addBtn.innerText="➕ Aggiungi giorno";
 addBtn.onclick=()=>{

  stored = {...stored, ...current};

  render();
  openSectionByName("CIBO");

 };

 fc.appendChild(addBtn);
}

renderFoodDays();
food.appendChild(fc);
app.appendChild(food);

app.appendChild(met);

if(stored["ALTRO_list"]){

renderSection(app,"ALTRO",otherItems,saved);
renderSection(app,"KIT PRIMO SOCCORSO",[],saved);

// 🧼 KIT IGIENE

}

// 🔧 KIT RIPARAZIONE KAYAK

    text += "\n🛠️ " + val;
  }
}

// 🔩 KIT RIPARAZIONE OGGETTI
for(let i=1;i<=10;i++){

// 🔥 include ALTRO sezioni

}

// 📝 NOTE
  if(saved["notes"]){

  }

  text += "\n\n🔗 App:\nhttps://michelenapione-sketch.github.io/Seakayak-AKC-Checklist/";

function exportData(){

  let stored = JSON.parse(localStorage.getItem("checklist")) || {};

  let saved = {...stored};

  document.querySelectorAll("input,textarea").forEach(i=>{
    saved[i.id]= i.type==="checkbox"? i.checked : i.value;
  });

  // mantiene ALTRO_list
  if(stored["ALTRO_list"]){
    saved["ALTRO_list"] = stored["ALTRO_list"];
  }

  localStorage.setItem("checklist", JSON.stringify(saved));

  let blob = new Blob([JSON.stringify(saved, null, 2)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "checklist_kayak.json";
  a.click();
}

function importData(event){
  let file = event.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(e){
    try{
      let data = JSON.parse(e.target.result);
      localStorage.setItem("checklist", JSON.stringify(data));
      alert("Import completato 👍");
      location.reload();
    }catch(err){
      alert("File non valido ❌");
    }
  };

  reader.readAsText(file);
}


function openSectionByName(name){
  document.querySelectorAll('.section').forEach(sec=>{
    const header = sec.querySelector('.section-header');
    const content = sec.querySelector('.section-content');
    if(header && content){
      if(header.innerText.includes(name)){
        content.style.display = "block";
      }
    }
  });
}


// 🌍 GPS + MAPPA
function initMap(lat, lon){
  document.getElementById("map").style.display = "block";

  if(mapInstance){
    mapInstance.remove();
  }
  mapInstance = L.map('map').setView([lat, lon], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapInstance);

  L.marker([lat, lon]).addTo(mapInstance)
    .bindPopup("Sei qui")
    .openPopup();
}

let mapVisible = false;
let mapInstance = null;

function getLocation(){
  if(mapVisible){
    document.getElementById("map").style.display = "none";
    document.getElementById("gps").innerHTML = "";
    mapVisible = false;
    return;
  }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      document.getElementById("gps").innerHTML =
        "📍 Lat: "+lat.toFixed(5)+" | Lon: "+lon.toFixed(5);

      initMap(lat, lon);
      mapVisible = true;

    }, ()=>{
      alert("GPS non disponibile");
    });
  }
}
